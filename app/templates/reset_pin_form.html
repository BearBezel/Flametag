{% extends "base.html" %}
{% block content %}

<div class="page">
  <div class="page-header">
    <div class="badge">
      New PIN • <span class="code">{{ lighter.token }}</span>
    </div>

    <h1 class="page-title" style="margin-top:14px;">Set a new PIN</h1>
    <p class="page-subtitle">
      Choose a new PIN (min 4 characters).
    </p>
  </div>

  <div class="panel">
    <form method="post" class="stack">
      <label>New PIN</label>
      <input name="pin" placeholder="New PIN" />
      <button class="btn primary" type="submit">Save new PIN</button>
      <div class="small-note">
        After saving, use it to unlock Messages / Edit.
      </div>
    </form>
  </div>
</div>

{% endblock %}
