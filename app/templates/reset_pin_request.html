{% extends "base.html" %}
{% block content %}

<div class="page">
  <div class="page-header">
    <div class="badge">
      Reset PIN • <span class="code">{{ lighter.token }}</span>
    </div>

    <h1 class="page-title" style="margin-top:14px;">Reset your owner PIN</h1>
    <p class="page-subtitle">
      Enter the email saved on this tag. We’ll send you a reset link.
    </p>
  </div>

  <div class="panel">
    <form method="post" class="stack">
      <label>Email on this tag</label>
      <input name="email" placeholder="you@email.com" />
      <button class="btn primary" type="submit">Send reset link</button>
      <div class="small-note">
        Link expires in 30 minutes.
      </div>
    </form>
  </div>

  <div class="btn-row" style="margin-top:14px;">
    <a class="btn secondary" href="{{ url_for('main.lighter_page', token=lighter.token) }}">Back to Tag</a>
  </div>
</div>

{% endblock %}
